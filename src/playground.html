<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ChatAgent · playground</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
<link href="https://fonts.bunny.net/css?family=inter:400,500,600,700|jetbrains-mono:400,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #08080c;
    --bg-1: #0e0e14;
    --bg-2: #14141c;
    --bg-3: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.14);
    --text-0: #f4f4f5;
    --text-1: #a1a1aa;
    --text-2: #71717a;
    --accent: #8b5cf6;
    --accent-2: #6366f1;
    --user: #3b82f6;
    --assistant: #10b981;
    --tool-running: #f59e0b;
    --tool-done: #10b981;
    --tool-error: #ef4444;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font: 14px/1.55 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text-0);
    background: radial-gradient(ellipse at top left, rgba(139,92,246,0.08), transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(99,102,241,0.06), transparent 50%),
                var(--bg-0);
    background-attachment: fixed;
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100vh;
    overflow: hidden;
  }
  code, .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }

  /* Sidebar */
  aside {
    border-right: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(20,20,28,0.6), rgba(8,8,12,0.6));
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  aside .brand {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  aside .brand .logo {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center;
    box-shadow: 0 4px 16px rgba(139,92,246,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    margin-bottom: 12px;
  }
  aside .brand .logo svg { width: 18px; height: 18px; }
  aside .brand .name { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
  aside .brand .sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }

  aside .section {
    padding: 18px 20px 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-2);
  }
  aside .tools { padding: 0 14px 20px; overflow-y: auto; flex: 1; }

  .tool-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: all .15s ease;
    position: relative;
    overflow: hidden;
  }
  .tool-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    opacity: 0;
    transition: opacity .15s ease;
  }
  .tool-card:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  .tool-card:hover::before { opacity: 1; }
  .tool-card .name {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-0);
    margin-bottom: 4px;
  }
  .tool-card .desc { font-size: 12px; color: var(--text-1); line-height: 1.45; }
  .tool-card .perms { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .tool-card .perms span {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    padding: 2px 7px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-1);
  }
  .empty { color: var(--text-2); font-size: 12px; padding: 8px 14px; font-style: italic; }

  /* Main */
  main { display: flex; flex-direction: column; min-height: 0; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,8,12,0.6);
    backdrop-filter: blur(12px);
  }
  header h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  header .right { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-2); }
  header .conn { display: flex; align-items: center; gap: 6px; }
  header .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-2);
    transition: background .2s ease, box-shadow .2s ease;
  }
  header .conn.online .dot {
    background: var(--assistant);
    box-shadow: 0 0 8px var(--assistant), 0 0 0 0 rgba(16,185,129,0.5);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px var(--assistant), 0 0 0 0 rgba(16,185,129,0.5); }
    50%      { box-shadow: 0 0 8px var(--assistant), 0 0 0 6px rgba(16,185,129,0); }
  }
  header .iid {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-2);
    padding: 3px 8px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  header button {
    font: inherit;
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    border-radius: 7px;
    color: var(--text-1);
    cursor: pointer;
    font-size: 12px;
    transition: all .12s ease;
  }
  header button:hover { color: var(--text-0); border-color: var(--border-strong); background: var(--bg-3); }

  /* Log */
  #log { flex: 1; overflow-y: auto; padding: 28px 24px 12px; display: flex; flex-direction: column; gap: 18px; }
  #log::-webkit-scrollbar { width: 8px; }
  #log::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }

  .empty-state {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; color: var(--text-2);
    text-align: center;
  }
  .empty-state .icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(99,102,241,0.1));
    border: 1px solid var(--border);
    display: grid; place-items: center;
  }
  .empty-state .icon svg { width: 24px; height: 24px; opacity: 0.6; }
  .empty-state h2 { font-size: 16px; font-weight: 600; color: var(--text-0); margin: 0; letter-spacing: -0.01em; }
  .empty-state p { font-size: 13px; max-width: 360px; margin: 0; line-height: 1.55; }

  .msg { animation: fadein .25s ease; max-width: 760px; width: 100%; }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg .role {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 8px;
    padding: 3px 8px;
    border-radius: 999px;
  }
  .msg.user .role { color: var(--user); background: rgba(59,130,246,0.1); }
  .msg.assistant .role { color: var(--assistant); background: rgba(16,185,129,0.1); }
  .msg .body { font-size: 14.5px; line-height: 1.65; color: var(--text-0); white-space: pre-wrap; word-wrap: break-word; }

  .tool-call {
    display: flex; align-items: flex-start; gap: 10px;
    margin: 10px 0;
    padding: 10px 14px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-left: 2px solid var(--tool-running);
    border-radius: var(--radius);
    font-size: 13px;
    transition: border-color .2s ease;
  }
  .tool-call.done { border-left-color: var(--tool-done); }
  .tool-call.error { border-left-color: var(--tool-error); }
  .tool-call .icon {
    display: grid; place-items: center; flex-shrink: 0;
    width: 18px; height: 18px; margin-top: 2px;
  }
  .tool-call .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(245,158,11,0.25);
    border-top-color: var(--tool-running);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  .tool-call.done .spinner { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tool-call .body { flex: 1; min-width: 0; }
  .tool-call .name { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text-0); }
  .tool-call .out {
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-1);
    background: var(--bg-1);
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    max-height: 200px; overflow: auto;
    white-space: pre-wrap; word-break: break-all;
  }

  .typing { display: inline-flex; gap: 3px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-1);
    animation: typing 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.25; transform: translateY(0); }
    30%           { opacity: 1; transform: translateY(-3px); }
  }

  /* Input area */
  .input-wrap { padding: 12px 24px 18px; border-top: 1px solid var(--border); background: rgba(8,8,12,0.6); }
  form {
    max-width: 760px; margin: 0 auto;
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 8px 8px 8px 14px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  form:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(139,92,246,0.12);
  }
  textarea {
    flex: 1; resize: none;
    padding: 8px 0; font: inherit;
    border: 0; background: transparent; color: var(--text-0);
    min-height: 28px; max-height: 200px;
    outline: none;
  }
  textarea::placeholder { color: var(--text-2); }
  button[type="submit"] {
    padding: 8px 14px; font: inherit; font-weight: 500;
    border: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: transform .1s ease, opacity .15s ease, box-shadow .15s ease;
    box-shadow: 0 2px 8px rgba(99,102,241,0.3);
    display: flex; align-items: center; gap: 6px;
  }
  button[type="submit"]:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
  button[type="submit"]:active:not(:disabled) { transform: translateY(0); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button[type="submit"] svg { width: 14px; height: 14px; }

  .hint { max-width: 760px; margin: 6px auto 0; font-size: 11px; color: var(--text-2); padding: 0 12px; }
  kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 1px 5px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    color: var(--text-1);
  }
</style>
</head>
<body>

<aside>
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2 L4 7 V17 L12 22 L20 17 V7 Z" stroke="white" stroke-width="1.8" stroke-linejoin="round" fill="rgba(255,255,255,0.1)" />
        <circle cx="12" cy="12" r="3" fill="white" />
      </svg>
    </div>
    <div class="name">ChatAgent</div>
    <div class="sub">Powered by Claude · code-mode tools</div>
  </div>
  <div class="section">Tools</div>
  <div class="tools" id="tools"><div class="empty">loading…</div></div>
</aside>

<main>
  <header>
    <h1>Playground</h1>
    <div class="right">
      <div class="conn" id="conn">
        <div class="dot"></div><span id="conn-text">connecting</span>
      </div>
      <span class="iid" id="instance"></span>
      <button id="reset" title="Start a new conversation">New chat</button>
    </div>
  </header>

  <div id="log">
    <div class="empty-state" id="empty">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Start the conversation</h2>
      <p>Ask the agent something, and it'll pick the right tool from the sidebar to act on it.</p>
    </div>
  </div>

  <div class="input-wrap">
    <form id="form" autocomplete="off">
      <textarea id="input" rows="1" placeholder="Ask the agent…"></textarea>
      <button type="submit" id="send" disabled>
        <span>Send</span>
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>
    <div class="hint"><kbd>↵</kbd> send · <kbd>⇧↵</kbd> newline</div>
  </div>
</main>

<script type="module">
  // --- tools manifest ---
  const tools = await fetch("/api/tools").then(r => r.json()).catch(() => []);
  const toolsEl = document.getElementById("tools");
  toolsEl.innerHTML = tools.length === 0
    ? '<div class="empty">no tools registered</div>'
    : tools.map(t => `
      <div class="tool-card">
        <div class="name">${t.name}</div>
        <div class="desc">${t.description}</div>
        <div class="perms">${t.permissions.map(p => `<span>${p}</span>`).join("")}</div>
      </div>
    `).join("");

  // --- conversation state ---
  let instance = localStorage.getItem("playground-instance");
  if (!instance) { instance = crypto.randomUUID(); localStorage.setItem("playground-instance", instance); }
  document.getElementById("instance").textContent = instance.slice(0, 8);
  document.getElementById("reset").onclick = () => { localStorage.removeItem("playground-instance"); location.reload(); };

  const messages = [];
  const log = document.getElementById("log");
  const empty = document.getElementById("empty");
  const conn = document.getElementById("conn");
  const connText = document.getElementById("conn-text");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const form = document.getElementById("form");
  let waitingForResponse = false;

  function autosize() { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 200) + "px"; }
  input.addEventListener("input", autosize);

  function setConn(state, label) {
    conn.classList.toggle("online", state === "online");
    connText.textContent = label;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
  }

  function render() {
    if (empty && empty.parentNode) empty.remove();
    log.innerHTML = "";
    for (const m of messages) {
      const div = document.createElement("div");
      div.className = `msg ${m.role}`;
      const roleHtml = m.role === "user"
        ? '<div class="role">You</div>'
        : '<div class="role">Agent</div>';
      let bodyHtml = '<div class="body">';
      let textBuf = "";
      const flush = () => { if (textBuf) { bodyHtml += escapeHtml(textBuf); textBuf = ""; } };
      for (const part of m.parts) {
        if (part.type === "text") {
          textBuf += part.text;
        } else if (part.type === "tool") {
          flush();
          const cls = part.error ? "error" : (part.done ? "done" : "");
          const outHtml = part.done && part.output !== undefined
            ? `<div class="out">${escapeHtml(typeof part.output === "string" ? part.output : JSON.stringify(part.output, null, 2))}</div>`
            : "";
          bodyHtml += `
            <div class="tool-call ${cls}">
              <div class="icon">${part.done ? checkSvg() : '<div class="spinner"></div>'}</div>
              <div class="body">
                <span class="name">${escapeHtml(part.name || "tool")}</span>
                ${part.done ? "" : '<span style="color: var(--text-2); margin-left: 6px;">running…</span>'}
                ${outHtml}
              </div>
            </div>`;
        }
      }
      flush();
      // typing indicator if assistant has nothing yet
      if (m.role === "assistant" && !m.parts.some(p => p.type === "text" && p.text) && !m.parts.some(p => p.type === "tool")) {
        bodyHtml += '<div class="typing"><span></span><span></span><span></span></div>';
      }
      bodyHtml += "</div>";
      div.innerHTML = roleHtml + bodyHtml;
      log.appendChild(div);
    }
    log.scrollTop = log.scrollHeight;
  }

  function checkSvg() {
    return '<svg viewBox="0 0 24 24" width="14" height="14" fill="none"><path d="M5 13l4 4L19 7" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  // --- websocket client (Think chat protocol) ---
  setConn("connecting", "connecting");
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}/agents/chat-agent/${instance}`);
  ws.onopen = () => { setConn("online", "online"); sendBtn.disabled = false; };
  ws.onclose = () => { setConn("offline", "disconnected"); sendBtn.disabled = true; };
  ws.onerror = () => { setConn("offline", "error"); };

  let activeAssistant = null;

  ws.onmessage = (event) => {
    let m;
    try { m = JSON.parse(event.data); } catch { return; }

    if (m.type === "cf_agent_chat_messages") {
      messages.length = 0;
      for (const um of m.messages || []) {
        const role = um.role;
        const parts = [];
        for (const p of um.parts || []) {
          if (p.type === "text") parts.push({ type: "text", text: p.text || "" });
          else if (p.type?.startsWith("tool-")) parts.push({
            type: "tool",
            name: p.type.replace(/^tool-/, ""),
            done: p.state === "output-available" || p.state === "output-error",
            error: p.state === "output-error",
            output: p.output,
          });
        }
        messages.push({ role, parts });
      }
      activeAssistant = null;
      render();
      return;
    }

    if (m.type !== "cf_agent_use_chat_response") return;

    if (m.error) {
      if (!activeAssistant) { activeAssistant = { role: "assistant", parts: [] }; messages.push(activeAssistant); }
      activeAssistant.parts.push({ type: "text", text: `\n[error] ${m.body}` });
      render();
      return;
    }

    if (m.done) {
      activeAssistant = null;
      waitingForResponse = false;
      sendBtn.disabled = false;
      return;
    }

    let chunk;
    try { chunk = JSON.parse(m.body); } catch { return; }

    if (!activeAssistant) { activeAssistant = { role: "assistant", parts: [] }; messages.push(activeAssistant); }

    switch (chunk.type) {
      case "text-delta": {
        let last = activeAssistant.parts[activeAssistant.parts.length - 1];
        if (!last || last.type !== "text") {
          last = { type: "text", text: "" };
          activeAssistant.parts.push(last);
        }
        last.text += chunk.delta || "";
        break;
      }
      case "tool-input-start":
      case "tool-input-available": {
        const existing = activeAssistant.parts.find(p => p.type === "tool" && p.toolCallId === chunk.toolCallId);
        if (!existing) {
          activeAssistant.parts.push({
            type: "tool",
            toolCallId: chunk.toolCallId,
            name: chunk.toolName,
            done: false,
          });
        }
        break;
      }
      case "tool-output-available":
      case "tool-output-error": {
        const existing = activeAssistant.parts.find(p => p.type === "tool" && p.toolCallId === chunk.toolCallId);
        if (existing) {
          existing.done = true;
          existing.error = chunk.type === "tool-output-error";
          existing.output = chunk.output ?? chunk.errorText;
        }
        break;
      }
    }
    render();
  };

  // --- form handling ---
  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || ws.readyState !== WebSocket.OPEN || waitingForResponse) return;

    const userMsg = { id: crypto.randomUUID(), role: "user", parts: [{ type: "text", text }] };
    messages.push({ role: "user", parts: [{ type: "text", text }] });
    render();
    input.value = "";
    autosize();
    waitingForResponse = true;
    sendBtn.disabled = true;

    ws.send(JSON.stringify({
      type: "cf_agent_use_chat_request",
      id: crypto.randomUUID(),
      init: { method: "POST", body: JSON.stringify({ messages: [userMsg] }) },
    }));
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  input.focus();
</script>
</body>
</html>
