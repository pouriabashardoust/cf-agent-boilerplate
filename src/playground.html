<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ChatAgent</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
<link href="https://fonts.bunny.net/css?family=geist:400,500,600,700|geist-mono:400,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --topbar-h: 56px;

    --bg: #fafaf9;
    --surface: #ffffff;
    --surface-2: #f5f5f4;
    --surface-3: #ececea;
    --border: #e7e5e4;
    --border-strong: #d6d3d1;

    --text: #1c1917;
    --text-soft: #57534e;
    --text-muted: #a8a29e;

    --accent: #d97706;
    --accent-soft: #fde7c2;
    --accent-glow: rgba(217, 119, 6, 0.14);
    --user: #1c1917;
    --success: #15803d;
    --success-bg: #f0fdf4;
    --danger: #b91c1c;
    --danger-bg: #fef2f2;

    --sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'Geist Mono', ui-monospace, SFMono-Regular, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    color: var(--text);
    font: 15px/1.55 var(--sans);
    -webkit-font-smoothing: antialiased;
    background: var(--bg);
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* === Sidebar === */
  aside {
    background: var(--bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .brand {
    height: var(--topbar-h);
    padding: 0 20px;
    display: flex; align-items: center; gap: 11px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .brand .avatar {
    width: 26px; height: 26px;
    border-radius: 7px;
    background: var(--text);
    color: var(--bg);
    display: grid; place-items: center;
    font-weight: 600; font-size: 12.5px;
    letter-spacing: -0.01em;
    flex-shrink: 0;
  }
  .brand .name {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.012em;
    color: var(--text);
  }

  .section {
    height: 36px;
    padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 8px;
  }
  .section .count {
    font-size: 10px;
    color: var(--text-soft);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 7px;
    letter-spacing: 0.04em;
  }

  .tools {
    padding: 0 12px 16px;
    overflow-y: auto;
    flex: 1;
  }
  .tools::-webkit-scrollbar { width: 6px; }
  .tools::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .tool-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 12px;
    margin-bottom: 4px;
    cursor: default;
    transition: border-color .12s ease, background .12s ease;
  }
  .tool-card:hover {
    border-color: var(--border-strong);
    background: var(--surface);
  }
  .tool-card .name {
    font-family: var(--mono);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.005em;
  }
  .tool-card .desc {
    font-size: 12.5px;
    color: var(--text-soft);
    line-height: 1.5;
    margin-bottom: 9px;
  }
  .tool-card .perms { display: flex; flex-wrap: wrap; gap: 4px; }
  .tool-card .perms span {
    font-family: var(--mono);
    font-size: 10px;
    padding: 1.5px 7px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-soft);
    letter-spacing: 0.01em;
  }
  .empty {
    color: var(--text-muted);
    font-size: 13px;
    padding: 12px;
  }

  /* === Main === */
  main {
    display: flex; flex-direction: column;
    min-height: 0;
    background: var(--surface);
  }
  header.bar {
    height: var(--topbar-h);
    padding: 0 24px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  header.bar h1 {
    font-size: 14px; font-weight: 600; margin: 0;
    letter-spacing: -0.012em;
    color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }
  header.bar h1 .label {
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    padding-right: 10px;
    border-right: 1px solid var(--border);
  }

  header.bar .right { display: flex; align-items: center; gap: 8px; }
  header.bar .conn {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  header.bar .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
    transition: background .25s ease, box-shadow .25s ease;
  }
  header.bar .conn.online .dot {
    background: var(--success);
    box-shadow: 0 0 0 3px rgba(21, 128, 61, 0.12);
  }
  header.bar .iid {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    padding: 4px 9px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    letter-spacing: 0.02em;
  }
  header.bar button {
    font: inherit; font-size: 12px; font-weight: 500;
    padding: 5px 11px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-soft);
    cursor: pointer;
    border-radius: 6px;
    transition: all .12s ease;
  }
  header.bar button:hover {
    color: var(--text);
    border-color: var(--border-strong);
    background: var(--surface-2);
  }

  /* === Conversation === */
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 36px 24px 8px;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  #log::-webkit-scrollbar { width: 8px; }
  #log::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  .empty-state {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 14px;
    color: var(--text-muted);
    text-align: center;
    padding: 64px 0;
  }
  .empty-state .icon {
    width: 44px; height: 44px;
    display: grid; place-items: center;
    border-radius: 11px;
    background: var(--accent-soft);
    color: var(--accent);
  }
  .empty-state .icon svg { width: 20px; height: 20px; }
  .empty-state h2 {
    font-size: 18px; font-weight: 600; margin: 0;
    letter-spacing: -0.015em;
    color: var(--text);
  }
  .empty-state p {
    font-size: 14px;
    max-width: 380px; margin: 0;
    color: var(--text-soft);
    line-height: 1.55;
  }

  /* Messages — clean, content-first */
  .msg {
    width: 100%; max-width: 720px;
    animation: enter .22s cubic-bezier(.22,.8,.36,1);
  }
  @keyframes enter {
    from { opacity: 0; transform: translateY(3px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg .role {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .msg .role::before {
    content: '';
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .msg.user .role { color: var(--text); }
  .msg.user .role::before { background: var(--text); }
  .msg.assistant .role { color: var(--accent); }
  .msg.assistant .role::before { background: var(--accent); }

  .msg .body {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  /* Tool call — sharp, tight, light card */
  .tool-call {
    display: flex; gap: 10px; align-items: flex-start;
    margin: 12px 0;
    padding: 10px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13.5px;
    color: var(--text-soft);
    transition: border-color .25s ease, background .25s ease;
  }
  .tool-call.done { border-color: rgba(21,128,61,0.25); background: var(--success-bg); }
  .tool-call.error { border-color: rgba(185,28,28,0.25); background: var(--danger-bg); }
  .tool-call .icon {
    flex-shrink: 0;
    width: 16px; height: 16px;
    display: grid; place-items: center;
    margin-top: 2px;
  }
  .tool-call .spinner {
    width: 10px; height: 10px;
    border: 1.5px solid rgba(217,119,6,0.25);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .85s linear infinite;
  }
  .tool-call.done .spinner { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tool-call .body { flex: 1; min-width: 0; }
  .tool-call .name {
    font-family: var(--mono);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.005em;
  }
  .tool-call .status {
    color: var(--text-muted);
    margin-left: 8px;
    font-size: 12.5px;
  }
  .tool-call .out {
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.55;
    color: var(--text-soft);
    background: var(--surface);
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: 6px;
    max-height: 240px; overflow: auto;
    white-space: pre-wrap; word-break: break-all;
  }

  /* Typing dots */
  .typing { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    opacity: 0.4;
    animation: typing 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.25; transform: translateY(0); }
    30%           { opacity: 1; transform: translateY(-3px); }
  }

  /* === Composer === */
  .composer {
    padding: 14px 24px 22px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex; flex-direction: column; align-items: center;
  }
  form {
    width: 100%; max-width: 720px;
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 8px 8px 14px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  form:focus-within {
    border-color: var(--text);
    box-shadow: 0 0 0 3px rgba(28, 25, 23, 0.06);
  }
  textarea {
    flex: 1; resize: none;
    padding: 6px 0;
    font: inherit; font-size: 15px;
    color: var(--text);
    border: 0; background: transparent;
    min-height: 24px; max-height: 200px;
    outline: none;
  }
  textarea::placeholder { color: var(--text-muted); }
  button[type="submit"] {
    padding: 8px 14px;
    font: inherit; font-size: 13px; font-weight: 500;
    border: 0;
    background: var(--text);
    color: var(--surface);
    border-radius: 8px;
    cursor: pointer;
    transition: filter .12s ease, transform .1s ease, opacity .15s ease;
    display: flex; align-items: center; gap: 6px;
  }
  button[type="submit"]:hover:not(:disabled) { filter: brightness(1.15); }
  button[type="submit"]:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button[type="submit"] svg { width: 13px; height: 13px; }

  .hint {
    width: 100%; max-width: 720px;
    margin-top: 8px;
    font-size: 11px; color: var(--text-muted);
    display: flex; gap: 14px;
  }
  kbd {
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 5px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    color: var(--text-soft);
  }

  ::selection { background: var(--accent-soft); color: var(--text); }
</style>
</head>
<body>

<aside>
  <div class="brand">
    <div class="avatar">C</div>
    <div class="name">ChatAgent</div>
  </div>

  <div class="section"><span>Tools</span><span class="count" id="tool-count">0</span></div>
  <div class="tools" id="tools"><div class="empty">loading…</div></div>
</aside>

<main>
  <header class="bar">
    <h1><span class="label">Conversation</span><span>a fresh thread</span></h1>
    <div class="right">
      <div class="conn" id="conn">
        <div class="dot"></div><span id="conn-text">connecting</span>
      </div>
      <span class="iid" id="instance"></span>
      <button id="reset" title="Start a new conversation">New</button>
    </div>
  </header>

  <div id="log">
    <div class="empty-state" id="empty">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>What can I help with?</h2>
      <p>Ask anything. The agent will pick the right tool from the sidebar to act on it.</p>
    </div>
  </div>

  <div class="composer">
    <form id="form" autocomplete="off">
      <textarea id="input" rows="1" placeholder="Message the agent…"></textarea>
      <button type="submit" id="send" disabled>
        Send
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>
    <div class="hint"><span><kbd>↵</kbd> send</span><span><kbd>⇧↵</kbd> newline</span></div>
  </div>
</main>

<script type="module">
  // --- tools manifest ---
  const tools = await fetch("/api/tools").then(r => r.json()).catch(() => []);
  document.getElementById("tool-count").textContent = tools.length;
  const toolsEl = document.getElementById("tools");
  toolsEl.innerHTML = tools.length === 0
    ? '<div class="empty">no tools registered</div>'
    : tools.map(t => `
      <div class="tool-card">
        <div class="name">${t.name}</div>
        <div class="desc">${t.description}</div>
        <div class="perms">${t.permissions.map(p => `<span>${p}</span>`).join("")}</div>
      </div>
    `).join("");

  // --- conversation state ---
  let instance = localStorage.getItem("playground-instance");
  if (!instance) { instance = crypto.randomUUID(); localStorage.setItem("playground-instance", instance); }
  document.getElementById("instance").textContent = instance.slice(0, 8);
  document.getElementById("reset").onclick = () => { localStorage.removeItem("playground-instance"); location.reload(); };

  const log = document.getElementById("log");
  const empty = document.getElementById("empty");
  const conn = document.getElementById("conn");
  const connText = document.getElementById("conn-text");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const form = document.getElementById("form");
  let waitingForResponse = false;

  function autosize() { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 200) + "px"; }
  input.addEventListener("input", autosize);

  function setConn(state, label) {
    conn.classList.toggle("online", state === "online");
    connText.textContent = label;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
  }
  function checkSvg() {
    return '<svg viewBox="0 0 24 24" width="13" height="13" fill="none"><path d="M5 13l4 4L19 7" stroke="#15803d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  // --- DOM-driven incremental render (no flash on streaming) ---
  let activeMsgEl = null;
  let activeBodyEl = null;
  let activeTextEl = null;
  let activeTypingEl = null;
  const activeToolEls = new Map();

  function nearBottom() { return log.scrollTop + log.clientHeight >= log.scrollHeight - 24; }
  function autoScroll(stick) { if (stick) log.scrollTop = log.scrollHeight; }

  function appendUserMsg(text) {
    if (empty?.parentNode) empty.remove();
    const div = document.createElement("div");
    div.className = "msg user";
    const role = document.createElement("div");
    role.className = "role"; role.textContent = "You";
    const body = document.createElement("div");
    body.className = "body"; body.textContent = text;
    div.append(role, body);
    log.appendChild(div);
    autoScroll(true);
  }

  function startAssistantShell() {
    if (empty?.parentNode) empty.remove();
    activeMsgEl = document.createElement("div");
    activeMsgEl.className = "msg assistant";
    const role = document.createElement("div");
    role.className = "role"; role.textContent = "Agent";
    activeBodyEl = document.createElement("div");
    activeBodyEl.className = "body";
    activeTypingEl = document.createElement("div");
    activeTypingEl.className = "typing";
    activeTypingEl.innerHTML = '<span></span><span></span><span></span>';
    activeBodyEl.appendChild(activeTypingEl);
    activeMsgEl.append(role, activeBodyEl);
    log.appendChild(activeMsgEl);
    activeTextEl = null;
    activeToolEls.clear();
    autoScroll(true);
  }

  function dropTyping() {
    if (activeTypingEl?.parentNode) activeTypingEl.remove();
    activeTypingEl = null;
  }

  function appendTextDelta(delta) {
    if (!activeMsgEl) startAssistantShell();
    dropTyping();
    if (!activeTextEl) {
      activeTextEl = document.createElement("span");
      activeBodyEl.appendChild(activeTextEl);
    }
    const stick = nearBottom();
    activeTextEl.appendChild(document.createTextNode(delta));
    autoScroll(stick);
  }

  function appendToolStart(toolCallId, name) {
    if (!activeMsgEl) startAssistantShell();
    dropTyping();
    if (activeToolEls.has(toolCallId)) return;
    const tc = document.createElement("div");
    tc.className = "tool-call";
    tc.innerHTML =
      '<div class="icon"><div class="spinner"></div></div>' +
      '<div class="body">' +
        `<span class="name">${escapeHtml(name || "tool")}</span>` +
        '<span class="status">running…</span>' +
      '</div>';
    activeBodyEl.appendChild(tc);
    activeToolEls.set(toolCallId, tc);
    activeTextEl = null;
    autoScroll(true);
  }

  function finishTool(toolCallId, output, isError) {
    const tc = activeToolEls.get(toolCallId);
    if (!tc) return;
    tc.classList.add(isError ? "error" : "done");
    const icon = tc.querySelector(".icon");
    if (icon) icon.innerHTML = checkSvg();
    const status = tc.querySelector(".status");
    if (status) status.remove();
    if (output !== undefined) {
      const out = document.createElement("div");
      out.className = "out";
      out.textContent = typeof output === "string" ? output : JSON.stringify(output, null, 2);
      tc.querySelector(".body").appendChild(out);
    }
  }

  function endTurn() {
    dropTyping();
    activeMsgEl = null;
    activeBodyEl = null;
    activeTextEl = null;
    activeToolEls.clear();
    waitingForResponse = false;
    sendBtn.disabled = false;
  }

  function buildAssistantNode(parts) {
    const div = document.createElement("div");
    div.className = "msg assistant";
    const role = document.createElement("div");
    role.className = "role"; role.textContent = "Agent";
    const body = document.createElement("div");
    body.className = "body";
    for (const p of parts) {
      if (p.type === "text") {
        const span = document.createElement("span");
        span.textContent = p.text || "";
        body.appendChild(span);
      } else if (p.type?.startsWith("tool-")) {
        const isDone = p.state === "output-available" || p.state === "output-error";
        const isError = p.state === "output-error";
        const tc = document.createElement("div");
        tc.className = "tool-call" + (isDone ? (isError ? " error" : " done") : "");
        tc.innerHTML =
          `<div class="icon">${isDone ? checkSvg() : '<div class="spinner"></div>'}</div>` +
          '<div class="body">' +
            `<span class="name">${escapeHtml(p.type.replace(/^tool-/, ""))}</span>` +
          '</div>';
        if (isDone && p.output !== undefined) {
          const out = document.createElement("div");
          out.className = "out";
          out.textContent = typeof p.output === "string" ? p.output : JSON.stringify(p.output, null, 2);
          tc.querySelector(".body").appendChild(out);
        }
        body.appendChild(tc);
      }
    }
    div.append(role, body);
    return div;
  }

  function rebuildHistory(serverMessages) {
    if (waitingForResponse) return;
    log.innerHTML = "";
    if (empty && !empty.parentNode) log.appendChild(empty);
    let any = false;
    for (const um of serverMessages || []) {
      any = true;
      if (um.role === "user") {
        const text = (um.parts || []).filter(p => p.type === "text").map(p => p.text).join("");
        appendUserMsg(text);
      } else if (um.role === "assistant") {
        if (empty?.parentNode) empty.remove();
        log.appendChild(buildAssistantNode(um.parts || []));
      }
    }
    if (any) autoScroll(true);
  }

  // --- websocket client (Think chat protocol) ---
  setConn("connecting", "connecting");
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}/agents/chat-agent/${instance}`);
  ws.onopen = () => { setConn("online", "online"); sendBtn.disabled = false; input.focus(); };
  ws.onclose = () => { setConn("offline", "offline"); sendBtn.disabled = true; };
  ws.onerror = () => { setConn("offline", "error"); };

  ws.onmessage = (event) => {
    let m;
    try { m = JSON.parse(event.data); } catch { return; }

    if (m.type === "cf_agent_chat_messages") { rebuildHistory(m.messages); return; }
    if (m.type !== "cf_agent_use_chat_response") return;

    if (m.error) {
      if (!activeMsgEl) startAssistantShell();
      dropTyping();
      const err = document.createElement("div");
      err.style.color = "var(--danger)";
      err.style.marginTop = "6px";
      err.textContent = `Error: ${m.body}`;
      activeBodyEl.appendChild(err);
      return;
    }
    if (m.done) { endTurn(); return; }

    let chunk;
    try { chunk = JSON.parse(m.body); } catch { return; }

    switch (chunk.type) {
      case "text-delta":
        appendTextDelta(chunk.delta || "");
        break;
      case "tool-input-start":
      case "tool-input-available":
        appendToolStart(chunk.toolCallId, chunk.toolName);
        break;
      case "tool-output-available":
      case "tool-output-error":
        finishTool(chunk.toolCallId, chunk.output ?? chunk.errorText, chunk.type === "tool-output-error");
        break;
    }
  };

  // --- form handling ---
  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || ws.readyState !== WebSocket.OPEN || waitingForResponse) return;

    appendUserMsg(text);
    startAssistantShell();
    input.value = "";
    autosize();
    waitingForResponse = true;
    sendBtn.disabled = true;

    const userMsg = { id: crypto.randomUUID(), role: "user", parts: [{ type: "text", text }] };
    ws.send(JSON.stringify({
      type: "cf_agent_use_chat_request",
      id: crypto.randomUUID(),
      init: { method: "POST", body: JSON.stringify({ messages: [userMsg] }) },
    }));
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });
</script>
</body>
</html>
